<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Netbilim Dershanesi</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#9fd8ff;
  color:white;
}

.sidebar{
  position:fixed;
  top:15px;
  left:15px;
  width:180px;
  background:rgba(0,60,120,0.85);
  padding:12px;
  border-radius:15px;
}

.menu-btn{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.card{
  margin-left:220px;
  padding:30px;
}

.box{
  background:rgba(0,60,120,0.75);
  padding:20px;
  border-radius:15px;
}

button.option{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  font-size:13px;
  padding:6px;
  background:rgba(0,0,0,0.2);
}

#timer{
  font-size:18px;
  margin-bottom:10px;
  color:yellow;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
  <button class="menu-btn" onclick="selectCategory('turkce')">Türkçe</button>
  <button class="menu-btn" onclick="selectCategory('matematik')">Matematik</button>
  <button class="menu-btn" onclick="selectCategory('fen')">Fen</button>
</div>

<div class="card">
  <h2>Netbilim Dershanesi Sorularına Hoş Geldiniz</h2>
  <p>Sizi sazan gibi düşürecek sorular burada.</p>

  <div class="box">
    <div id="timer">Süre: 180</div>

    <h3 id="qText">Bir kategori seç</h3>

    <button class="option" id="A" onclick="answer('A')"></button>
    <button class="option" id="B" onclick="answer('B')"></button>
    <button class="option" id="C" onclick="answer('C')"></button>
    <button class="option" id="D" onclick="answer('D')"></button>

    <p id="info"></p>
  </div>
</div>

<div class="footer">Yapımcı: Emir ALP</div>

<script>

const questions = {
  turkce: [],
  matematik: [],
  fen: [
    {
      q: "Bir öğrenci 240 N ağırlığındaki yükü 3 hareketli ve 1 sabit makaradan oluşan sistemle yukarı çıkarıyor. Daha sonra yük 8 m uzunluk ve 2 m yüksekliğe sahip sürtünmeli eğik düzlemden çıkarılıyor (sürtünme 30 N). Buna göre I, II ve III hangisidir?",
      A: "I: 30 N — II: 90 N — III: 480 J",
      B: "I: 40 N — II: 90 N — III: 480 J",
      C: "I: 30 N — II: 60 N — III: 480 J",
      D: "I: 40 N — II: 60 N — III: 240 J",
      correct: "B"
    }
  ]
};

let current = null;
let timer = null;
let timeLeft = 180;

function startTimer(){
  clearInterval(timer);
  timeLeft = 180;

  timer = setInterval(() => {
    timeLeft--;

    document.getElementById("timer").innerText = "Süre: " + timeLeft;

    if(timeLeft <= 0){
      clearInterval(timer);
      document.getElementById("info").innerText = "sazan oldun yazık sana";
      nextQuestion();
    }
  }, 1000);
}

function selectCategory(cat){
  current = cat;
  loadQuestion();
}

function loadQuestion(){

  const list = questions[current];

  if(!list || list.length === 0){
    document.getElementById("qText").innerText = "Bu kategoride soru yok";
    document.getElementById("A").innerText = "";
    document.getElementById("B").innerText = "";
    document.getElementById("C").innerText = "";
    document.getElementById("D").innerText = "";
    document.getElementById("timer").innerText = "";
    return;
  }

  const q = list[0];

  document.getElementById("qText").innerText = q.q;
  document.getElementById("A").innerText = "A) " + q.A;
  document.getElementById("B").innerText = "B) " + q.B;
  document.getElementById("C").innerText = "C) " + q.C;
  document.getElementById("D").innerText = "D) " + q.D;

  document.getElementById("info").innerText = "";

  startTimer();
}

function nextQuestion(){
  loadQuestion();
}

function answer(choice){
  const q = questions[current][0];

  clearInterval(timer);

  if(choice === q.correct){
    confetti();
    document.getElementById("info").innerText = "Doğru 🎉";
  } else {
    document.getElementById("info").innerText = "sazan oldun yazık sana";
  }

  setTimeout(() => {
    nextQuestion();
  }, 1000);
}

</script>

</body>
</html>
