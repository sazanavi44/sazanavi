<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sazanavi</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  font-family: Arial;
  background: linear-gradient(120deg,#4facfe,#00f2fe);
  text-align:center;
  color:white;
}

.box{
  background:white;
  color:black;
  width:340px;
  margin:50px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.2);
}

button{
  width:100%;
  padding:10px;
  margin:8px 0;
  font-size:16px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#eee;
}

#score{
  margin-top:10px;
}
</style>
</head>

<body>

<h1>📘 SAZANAVİ</h1>

<div class="box">
  <h3 id="question"></h3>

  <button onclick="answer('A')" id="A"></button>
  <button onclick="answer('B')" id="B"></button>
  <button onclick="answer('C')" id="C"></button>
  <button onclick="answer('D')" id="D"></button>

  <p id="score"></p>
</div>

<audio id="wrongSound" src="https://www.myinstants.com/media/sounds/fail.mp3"></audio>

<script>
const questions=[
  {
    q:"Bir öğrenci 240 N ağırlığındaki yükü 3 hareketli ve 1 sabit makaradan oluşan sistemle yukarı çıkarıyor. Daha sonra yük 8 m uzunluk ve 2 m yüksekliğe sahip sürtünmeli eğik düzlemden çıkarılıyor (sürtünme 30 N). Buna göre I, II ve III hangisidir?",
    A:"I: 30 N — II: 90 N — III: 480 J",
    B:"I: 40 N — II: 90 N — III: 480 J",
    C:"I: 30 N — II: 60 N — III: 480 J",
    D:"I: 40 N — II: 60 N — III: 240 J",
    correct:"B"
  }
];

let i=0;
let score=0;

function load(){
  let q=questions[i];
  document.getElementById("question").innerText=q.q;
  document.getElementById("A").innerText="A) "+q.A;
  document.getElementById("B").innerText="B) "+q.B;
  document.getElementById("C").innerText="C) "+q.C;
  document.getElementById("D").innerText="D) "+q.D;
  document.getElementById("score").innerText="Skor: "+score;
}

function answer(x){
  let q=questions[i];

  if(x===q.correct){
    score++;
    confetti();
  }else{
    document.getElementById("wrongSound").play();
    alert("Taklaya geldin 😄");
  }

  i++;

  document.querySelector(".box").innerHTML=
    "<h2>Bitti 🎮</h2><p>Skor: "+score+"/1</p>";
}

load();
</script>

</body>
</html>
