<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazanavi</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#9fd8ff;
  color:white;
}

@keyframes shake {
  0%{transform:translate(0,0);}
  25%{transform:translate(-5px,5px);}
  50%{transform:translate(5px,-5px);}
  75%{transform:translate(-5px,5px);}
  100%{transform:translate(0,0);}
}
.shake{animation:shake 0.4s;}

.box{
  width:90%;
  max-width:500px;
  margin:60px auto;
  background:rgba(0,60,120,0.8);
  padding:20px;
  border-radius:15px;
}

button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.joker{
  background:orange;
}

#timer{
  font-weight:bold;
  color:yellow;
}
</style>
</head>

<body>

<div class="box">
  <h2>SAZANAVİ</h2>

  <div id="timer">Süre: 180</div>

  <h3 id="q"></h3>

  <button id="A" onclick="answer('A')"></button>
  <button id="B" onclick="answer('B')"></button>
  <button id="C" onclick="answer('C')"></button>
  <button id="D" onclick="answer('D')"></button>

  <hr>

  <button class="joker" onclick="joker5050()">🎯 50/50 Joker</button>
  <button class="joker" onclick="timeJoker()">⏱ +30sn Joker</button>

  <p id="info"></p>
</div>

<script>

const q = {
  soru:"Bir öğrenci 240 N yükü kaldırıyor... doğru cevap hangisi?",
  A:"I: 30 N — II: 90 N — III: 480 J",
  B:"I: 40 N — II: 90 N — III: 480 J",
  C:"I: 30 N — II: 60 N — III: 480 J",
  D:"I: 40 N — II: 60 N — III: 240 J",
  dogru:"B"
};

let time=180;
let timer;
let used5050=false;
let usedTime=false;

function load(){
  document.getElementById("q").innerText=q.soru;
  document.getElementById("A").innerText="A) "+q.A;
  document.getElementById("B").innerText="B) "+q.B;
  document.getElementById("C").innerText="C) "+q.C;
  document.getElementById("D").innerText="D) "+q.D;

  startTimer();
}

function startTimer(){
  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Süre: "+time;

    if(time<=0){
      clearInterval(timer);
      wrong();
    }
  },1000);
}

function answer(x){
  clearInterval(timer);

  if(x===q.dogru){
    confetti();
    document.getElementById("info").innerText="Doğru 🎉";
  }else{
    wrong();
  }
}

function wrong(){
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),400);
  document.getElementById("info").innerText="YANLIŞ YAPMAK YOK";
}

function joker5050(){
  if(used5050) return;

  used5050=true;

  const wrongs=["A","C","D"].filter(x=>x!==q.dogru);
  wrongs.slice(0,2).forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

function timeJoker(){
  if(usedTime) return;

  usedTime=true;
  time+=30;
}

load();

</script>

</body>
</html>
