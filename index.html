<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sazanavi</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(120deg,#4facfe,#00f2fe);
  text-align:center;
  color:white;
}

.box{
  background:white;
  color:black;
  width:340px;
  margin:50px auto;
  padding:20px;
  border-radius:15px;
}
button{
  width:100%;
  padding:10px;
  margin:6px 0;
}
</style>
</head>

<body>

<h1>SAZANAVİ</h1>

<div class="box">
  <h3 id="q"></h3>

  <button onclick="ans('A')" id="A"></button>
  <button onclick="ans('B')" id="B"></button>
  <button onclick="ans('C')" id="C"></button>
  <button onclick="ans('D')" id="D"></button>

  <p id="score"></p>
</div>

<script>
const q = {
  soru:"Bir öğrenci 240 N yükü kaldırıyor... doğru seçenek hangisi?",
  A:"I: 30 N — II: 90 N — III: 480 J",
  B:"I: 40 N — II: 90 N — III: 480 J",
  C:"I: 30 N — II: 60 N — III: 480 J",
  D:"I: 40 N — II: 60 N — III: 240 J",
  dogru:"B"
};

let score = 0;

document.getElementById("q").innerText = q.soru;
document.getElementById("A").innerText = "A) "+q.A;
document.getElementById("B").innerText = "B) "+q.B;
document.getElementById("C").innerText = "C) "+q.C;
document.getElementById("D").innerText = "D) "+q.D;

function ans(x){
  if(x === q.dogru){
    score++;
    alert("Doğru 🎉");
  }else{
    alert("Taklaya geldin 😄");
  }

  document.getElementById("score").innerText = "Skor: "+score+"/1";
}
</script>

</body>
</html>
