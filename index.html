<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sazanavi</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#9fd8ff;
  color:white;
}

/* SHAKE */
@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(-5px,5px);}
  50%{transform:translate(5px,-5px);}
  75%{transform:translate(-5px,5px);}
  100%{transform:translate(0,0);}
}
.shake{animation:shake 0.4s;}

.sidebar{
  position:fixed;
  top:15px;
  left:15px;
  width:180px;
  background:rgba(0,60,120,0.9);
  padding:12px;
  border-radius:15px;
}

.menu-btn{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.main{
  margin-left:220px;
  padding:30px;
}

.box{
  background:rgba(0,60,120,0.8);
  padding:20px;
  border-radius:15px;
  max-width:500px;
}

button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.joker{
  background:orange;
}

#timer{
  color:yellow;
  font-weight:bold;
}

.hidden{
  display:none;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  text-align:center;
  font-size:13px;
  padding:6px;
  background:rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="sidebar">
  <button class="menu-btn" onclick="selectCategory('matematik')">Matematik</button>
  <button class="menu-btn" onclick="selectCategory('fen')">Fen</button>
</div>

<div class="main">
  <h2>Netbilim Dershanesi Sorularına Hoş Geldiniz</h2>
  <p>Sizi sazan gibi düşürecek sorular burada.</p>

  <div class="box">
    <div id="timer"></div>

    <h3 id="q">Bir kategori seç</h3>

    <!-- ŞIKLAR BAŞTA GİZLİ -->
    <button id="A" class="hidden" onclick="answer('A')"></button>
    <button id="B" class="hidden" onclick="answer('B')"></button>
    <button id="C" class="hidden" onclick="answer('C')"></button>
    <button id="D" class="hidden" onclick="answer('D')"></button>

    <hr>

    <button class="joker hidden" id="j1" onclick="joker5050()">🎯 50/50</button>
    <button class="joker hidden" id="j2" onclick="timeJoker()">⏱ +30sn</button>

    <p id="info"></p>
  </div>
</div>

<div class="footer">Yapımcı: Emir ALP</div>

<script>

const questions = {
  matematik: [],
  fen: [{
    q:"Bir öğrenci 240 N ağırlığındaki yükü 3 hareketli ve 1 sabit makaradan oluşan sistemle yukarı çıkarıyor. Daha sonra yük 8 m uzunluk ve 2 m yüksekliğe sahip sürtünmeli eğik düzlemden çıkarılıyor (sürtünme 30 N). Buna göre I, II ve III hangisidir?",
    A:"I: 30 N — II: 90 N — III: 480 J",
    B:"I: 40 N — II: 90 N — III: 480 J",
    C:"I: 30 N — II: 60 N — III: 480 J",
    D:"I: 40 N — II: 60 N — III: 240 J",
    correct:"B"
  }]
};

let current=null;
let timer;
let time=180;

function selectCategory(cat){
  current=cat;

  if(!questions[cat] || questions[cat].length===0){
    document.getElementById("q").innerText="Bu kategoride soru yok";
    return;
  }

  load();
}

function load(){
  const q=questions[current][0];

  document.getElementById("q").innerText=q.q;

  ["A","B","C","D"].forEach(id=>{
    document.getElementById(id).classList.remove("hidden");
  });

  document.getElementById("j1").classList.remove("hidden");
  document.getElementById("j2").classList.remove("hidden");

  document.getElementById("A").innerText="A) "+q.A;
  document.getElementById("B").innerText="B) "+q.B;
  document.getElementById("C").innerText="C) "+q.C;
  document.getElementById("D").innerText="D) "+q.D;

  time=180;
  startTimer();
}

function startTimer(){
  clearInterval(timer);

  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Süre: "+time;

    if(time<=0){
      clearInterval(timer);
      wrong();
    }
  },1000);
}

function answer(x){
  clearInterval(timer);
  const q=questions[current][0];

  if(x===q.correct){
    confetti();
    document.getElementById("info").innerText="Doğru 🎉";
  }else{
    wrong();
  }
}

function wrong(){
  document.body.classList.add("shake");
  setTimeout(()=>document.body.classList.remove("shake"),400);
  document.getElementById("info").innerText="sazan oldun yazık sana";
}

function joker5050(){
  const q=questions[current][0];
  const wrongs=["A","B","C","D"].filter(x=>x!==q.correct);

  wrongs.slice(0,2).forEach(id=>{
    document.getElementById(id).style.display="none";
  });
}

function timeJoker(){
  time+=30;
}

</script>

</body>
</html>
